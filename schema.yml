    PatchedOrganization:
      type: object
      description: |-
        Serializer for Organization instances.

        The ``google_service_account`` field supports both reading and writing:
        - **Write**: accepts ``email``, ``audience``, ``public_key``,
          ``private_key_id`` (write-only), and ``private_key`` (write-only).
          Omitting the field on PATCH leaves existing credentials unchanged.
        - **Read**: returns ``email``, ``audience``, and ``configured: true/false``.
          Secret fields are never returned.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        should_sync_rooms:
          type: boolean
          description: Whether to sync rooms for this organization.
        google_service_account:
          type: object
          additionalProperties: {}
          nullable: true
          description:
            Return read-only service account info (no secrets), or None
            if unconfigured.
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
    PatchedProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          maxLength: 255
        profile_picture:
          type: string
          format: uri
          nullable: true
    PatchedServiceAccountWrite:
      type: object
      description: |-
        Write serializer for creating/rotating the org-level service account.

        ``private_key`` and ``private_key_id`` are write-only and are never echoed
        back in any response (reads go through ``ServiceAccountReadSerializer``).
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        audience:
          type: string
          maxLength: 255
        public_key:
          type: string
        private_key_id:
          type: string
          writeOnly: true
          maxLength: 255
        private_key:
          type: string
          writeOnly: true
    PatchedSystemUserTokenUpdate:
      type: object
      description: |-
        Input serializer for updating a public-API token's resource grants (Phase 15).

        Accepts ``available_resources`` (a non-empty list of valid ``PublicAPIResources`` values)
        only.  ``integration_name`` and ``token`` are never accepted or changed.
        The view reconciles ResourceAccess rows: adds rows for newly-granted resources,
        removes rows for dropped resources.
      properties:
        available_resources:
          type: array
          items:
