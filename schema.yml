      description: |-
        Read-only serializer for ``ExternalEventChangeRequest``.

        Exposes the fields needed by the first-party frontend to list, approve,
        and reject change requests.  The ``resolved_by`` field surfaces only the
        user id and display name — never raw membership / organization ids — to
        avoid leaking cross-tenant identity data.
      properties:
        id:
          type: integer
          readOnly: true
        event_id:
          type: integer
          readOnly: true
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ExternalEventChangeRequestStatusEnum'
          readOnly: true
        provider:
          allOf:
          - $ref: '#/components/schemas/ProviderEnum'
          readOnly: true
        proposed_values:
          readOnly: true
          description: 'Proposed field values: title, description, start_time, end_time.'
        retained_values:
          readOnly: true
          description: Snapshot of local field values before the change, used to undo
            on rejection.
        resolved_by_user_id:
          type: integer
          nullable: true
          description: Return the resolver's user id, or ``None`` when unresolved.
          readOnly: true
        resolved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created:
          type: string
          format: date-time
          readOnly: true
      required:
      - created
      - event_id
      - id
      - kind
      - proposed_values
      - provider
      - resolved_at
      - resolved_by_user_id
      - retained_values
      - status
    ExternalEventChangeRequestStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      - stale
      - auto_undone
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
        * `stale` - Stale
        * `auto_undone` - Auto-undone
    ExternalEventUpdatePolicyEnum:
      enum:
      - allow
      - change_request
      - forbidden
      type: string
      description: |-
        * `allow` - Allow direct updates
        * `change_request` - Updates create change requests
        * `forbidden` - Updates are forbidden
    FrequencyEnum:
      enum:
      - DAILY
      - WEEKLY
      - MONTHLY
      - YEARLY
      type: string
      description: |-
        * `DAILY` - Daily
        * `WEEKLY` - Weekly
        * `MONTHLY` - Monthly
        * `YEARLY` - Yearly
    KindEnum:
      enum:
      - update
      - delete
      type: string
      description: |-
        * `update` - Update
        * `delete` - Delete
    MyMembership:
      type: object
      description: |-
        Read-only serializer for the caller's active organization memberships.

        Used by ``GET /organizations/mine/`` to power the frontend org switcher.
        Returns a list of ``{organization: {id, name}, role}`` entries — one per
        active membership — without requiring the ``X-Organization-Id`` header.
      properties:
        organization:
          allOf:
          - $ref: '#/components/schemas/OrganizationBrief'
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
          description: |-
            Role the user holds in this organization. Admins can manage organization-scoped resources (e.g. CalendarGroups) regardless of direct ownership.

            * `member` - Member
            * `admin` - Admin
      required:
      - organization
      - role
    Notification:
      type: object
      description: |-
        Read-only serializer for in-app notification objects.

        Works for both vintasend Notification dataclasses (Phase 1 — returned by
        get_in_app_unread) and vintasend_django model instances (Phase 2 — ORM rows).

        Fields:
        - id, title, notification_type, status: present on both dataclass and model.
        - body: rendered at read time via body_template + best-available context.
        - created, modified: model-only; None for dataclass instances.
      properties:
        id:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
        notification_type:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
        body:
          type: string
          description: |-
            Render the body template with the best-available context.

            Priority:
            1. context_used — the context that was recorded at send time (on model rows,
               set by the backend when the notification was processed).
            2. context_kwargs — the original kwargs passed at creation time.
            3. Empty dict — render the template with no context (graceful degradation).

            Returns an empty string on rendering failure so the response always serialises.
          readOnly: true
        created:
          type: string
          nullable: true
          description: |-
            Return the creation timestamp as ISO 8601 string, or None for dataclasses.

            The vintasend Notification dataclass has no `created` attribute; only the
            vintasend_django ORM model does.
          readOnly: true
        modified:
          type: string
          nullable: true
          description: |-
            Return the last-modified timestamp as ISO 8601 string, or None for dataclasses.

            In vintasend 1.2.0 the Notification dataclass carries `modified`; ORM rows also
            have it. Returns None when the attribute is absent or None.
          readOnly: true
      required:
      - body
      - created
      - id
      - modified
      - notification_type
      - status
      - title
    Organization:
      type: object
      description: |-
        Serializer for Organization instances.

        The ``google_service_account`` field supports both reading and writing:
        - **Write**: accepts ``email``, ``admin_email``,
          ``private_key_id`` (write-only), and ``private_key`` (write-only).
          Omitting the field on PATCH leaves existing credentials unchanged.
        - **Read**: returns ``email``, ``admin_email``, and ``configured: true/false``.
          Secret fields are never returned.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        should_sync_rooms:
          type: boolean
          description: Whether to sync rooms for this organization.
        external_event_update_policy:
          allOf:
          - $ref: '#/components/schemas/ExternalEventUpdatePolicyEnum'
          description: |-
            Policy for handling inbound external provider edits and deletions to synced events. ALLOW: apply directly. CHANGE_REQUEST: route to approval. FORBIDDEN: auto-undo.

            * `allow` - Allow direct updates
            * `change_request` - Updates create change requests
            * `forbidden` - Updates are forbidden
        google_service_account:
          type: object
          additionalProperties: {}
          nullable: true
          description: Return read-only service account info (no secrets), or None
            if unconfigured.
          readOnly: true
        can_invite_organizations:
          type: boolean
          readOnly: true
          description: Whether this organization can invite/create other organizations.
            DB/Django-admin only — never exposed via any API. Enables the whole reseller
            capability bundle.
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - can_invite_organizations
      - created
      - google_service_account
      - id
      - modified
      - name
    OrganizationBranding:
      type: object
      description: |-
        Serializer for OrganizationBranding (reseller-admin REST endpoints).

        Exposes app_name, logo_url, primary_color, secondary_color, support_email,
        and return_url_allowlist. NEVER exposes can_invite_organizations or makes
        organization writable (the org is set from the acting org in the view).

        Validates:
        - Color format: #RRGGBB or #RRGGBBAA (regex).
        - Each return_url_allowlist entry is a valid URL (URLValidator).
      properties:
        app_name:
          type: string
          description: The display name of the white-labeled app (e.g., 'MyScheduler').
          maxLength: 120
        logo_url:
          type: string
          format: uri
          description: URL to the reseller's logo image.
          maxLength: 200
        primary_color:
          type: string
          description: 'Primary color as hex code: #RRGGBB or #RRGGBBAA.'
          maxLength: 9
        secondary_color:
          type: string
          description: 'Secondary color as hex code: #RRGGBB or #RRGGBBAA.'
          maxLength: 9
        support_email:
          type: string
          format: email
          description: Email address for the From/reply-to on branded transactional
            emails.
          maxLength: 254
        return_url_allowlist:
          type: array
          items:
            type: string
            format: uri
            maxLength: 200
          description: List of URLs that are allowed as return addresses after OAuth
            flows.
      required:
      - app_name
    OrganizationBrief:
      type: object
      description: |-
        Lightweight read-only serializer for an Organization.

        Exposes only the fields needed for the org-switcher list: ``id`` and ``name``.
        Intentionally avoids the heavier ``OrganizationSerializer`` (which loads the
        Google service account) to keep ``GET /organizations/mine/`` fast.
