    PatchedCalendar:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        email:
          type: string
          format: email
          readOnly: true
        external_id:
          type: string
          readOnly: true
        provider:
          allOf:
            - $ref: '#/components/schemas/ProviderEnum'
          readOnly: true
        calendar_type:
          allOf:
            - $ref: '#/components/schemas/CalendarTypeEnum'
          readOnly: true
          description: |-
            The type of calendar. Personal calendars are for individual use, resource calendars are for shared resources, and virtual calendars are for online meetings or events.

            * `personal` - Personal Calendar
            * `resource` - Resource Calendar
            * `virtual` - Virtual Calendar
            * `bundle` - Bundle Calendar
        capacity:
          type: integer
          readOnly: true
          nullable: true
          description:
            The maximum number of attendees that can be accommodated in
            this calendar's events. This is only applicable for resource calendars.
        manage_available_windows:
          type: boolean
          description:
            If true, this calendar can manage its own available time windows.
            If not, it will use the available time windows of the external calendar
            it's attached to.
        is_active:
          type: boolean
          readOnly: true
          description:
            Whether this calendar is active. Inactive calendars are hidden
            from default list/detail queries. Use DELETE /calendar/{id}/ to soft-disable
            (sets this to False) instead of deleting the row. Opt-in to see disabled
            calendars via ?include_inactive=true. Default True keeps every existing
            read unchanged.
        sync_enabled:
          type: boolean
          description:
            Whether this calendar's events are pulled from the external
            provider. Set to False to skip syncing calendars that aren't useful for
            scheduling — holidays, birthdays, organization-wide events, etc. When
            False, no new CalendarSync is requested for this calendar (including webhook-
            and import-triggered syncs); previously synced events are left untouched.
            Default True keeps existing calendars syncing as before.
