  /change-requests/:
    get:
      operationId: change_requests_list
      description: |-
        List and act on external-event change requests (approve / reject).

        **Eligibility scoping (GET /change-requests/):**
        - **Admins** see all change requests in their organization.
        - **Members** see only requests whose target event they attend
          (``EventAttendance`` row for their membership).

        **Default filter:** ``status=PENDING``.  Pass ``?status=approved`` (or any
        valid status) to retrieve historical / resolved requests.

        **Approve (POST /change-requests/{id}/approve/):**
        Apply the proposed change locally.  Returns the updated request (200).

        **Reject (POST /change-requests/{id}/reject/):**
        Push the retained value back to the external provider (GCal) and mark
        the request ``REJECTED``.  Returns the updated request (200).

        **Error responses:**
        - ``403`` when the caller is not eligible to resolve the specific request.
        - ``409`` when the request is no longer ``PENDING``.
        - ``401`` when the caller is not authenticated.
      parameters:
      - in: header
        name: X-Organization-Id
        schema:
          type: string
        description: Selects the active organization for this request. Optional for
          callers that belong to exactly one active organization — the single membership
          is resolved implicitly. **Required** when the caller has two or more active
          memberships; omitting it in that case returns **400**. If the header names
          an organization the caller is not an active member of, the server returns
          **403**.
      - in: query
        name: event
        schema:
          type: number
        description: Filter by CalendarEvent ID
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - approved
          - auto_undone
          - pending
          - rejected
          - stale
        description: |-
          Filter by request status (default: pending)

          * `pending` - Pending
          * `approved` - Approved
          * `rejected` - Rejected
          * `stale` - Stale
          * `auto_undone` - Auto-undone
      tags:
      - External Event Change Requests
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedExternalEventChangeRequestList'
          description: ''
