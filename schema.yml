      type: object
      description: |-
        Read-only representation of a recorded :class:`UserConsent`.

        Returned by ``ConsentViewSet.create`` after ``ConsentService.record_consent``
        persists the acceptance; every field is read-only here too.
      properties:
        id:
          type: integer
          readOnly: true
        document_type:
          type: string
          readOnly: true
        policy_document:
          type: integer
          readOnly: true
        policy_document_version:
          type: integer
          readOnly: true
        source:
          allOf:
          - $ref: '#/components/schemas/SourceEnum'
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        phone_number:
          type: string
          readOnly: true
      required:
      - accepted_at
      - document_type
      - id
      - ip_address
      - phone_number
      - policy_document
      - policy_document_version
      - source
      - user_agent
    VisibilityEnum:
      enum:
      - active
      - unlisted
      - inactive
      type: string
      description: |-
        * `active` - Active
        * `unlisted` - Unlisted
        * `inactive` - Inactive
    WebhookConfiguration:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        url:
          type: string
          format: uri
          maxLength: 2000
        headers: {}
      required:
      - id
      - url
    WebhookEvent:
      type: object
      properties:
        configuration:
          type: integer
          readOnly: true
        main_event:
          type: integer
          readOnly: true
        event_type:
          $ref: '#/components/schemas/EventTypeEnum'
        url:
          type: string
          format: uri
          maxLength: 2000
        status:
          allOf:
          - $ref: '#/components/schemas/WebhookEventStatusEnum'
          readOnly: true
        headers: {}
        payload: {}
        response_status:
          type: integer
          readOnly: true
          nullable: true
        response_body:
          readOnly: true
          nullable: true
        response_headers:
          readOnly: true
          nullable: true
        retry_number:
          type: integer
          readOnly: true
          nullable: true
        send_after:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - configuration
      - created
      - event_type
      - main_event
      - modified
      - payload
      - response_body
      - response_headers
      - response_status
      - retry_number
      - send_after
      - status
      - url
    WebhookEventDoc:
      type: object
      description: |-
        Read-only catalog entry for a single ``WebhookEventType`` member.

        Plain ``Serializer`` over a dict built from the enum and
        ``webhooks.constants.WEBHOOK_EVENT_DESCRIPTIONS`` — there is no model backing this.
      properties:
        value:
          type: string
          readOnly: true
        label:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
      required:
      - description
      - label
      - value
    WebhookEventStatusEnum:
      enum:
      - pending
      - success
      - failed
      type: string
      description: |-
        * `pending` - Pending
        * `success` - Success
        * `failed` - Failed
    WeekStartEnum:
      enum:
      - MO
      - TU
      - WE
      - TH
      - FR
      - SA
      - SU
      type: string
      description: |-
        * `MO` - Monday
        * `TU` - Tuesday
        * `WE` - Wednesday
        * `TH` - Thursday
        * `FR` - Friday
        * `SA` - Saturday
        * `SU` - Sunday
    _CalendarGroupSlotSelectionInput:
      type: object
      properties:
        slot_id:
          type: integer
        calendar_ids:
          type: array
          items:
            type: integer
      required:
      - calendar_ids
      - slot_id
    _RangeInput:
      type: object
      properties:
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
      required:
      - end_time
      - start_time
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
