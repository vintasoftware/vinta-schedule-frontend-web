components:
  schemas:
    AcceptInvitation:
      type: object
      description: Serializer for accepting invitations via public endpoint.
      properties:
        token:
          type: string
      required:
      - token
    ActionEnum:
      enum:
      - create
      - update
      - delete
      type: string
      description: |-
        * `create` - create
        * `update` - update
        * `delete` - delete
    AvailableResourcesEnum:
      enum:
      - calendar_event
      - calendar
      - recurrence_rule
      - external_attendee
      - external_attendance
      - attendance
      - user
      - resource_allocation
      - event_recurring_exception
      - blocked_time
      - blocked_time_recurring_exception
      - available_time
      - available_time_recurring_exception
      - availability_windows
      - unavailable_windows
      - organization
      - calendar_group
      - system_user
      - membership
      - invitation
      - branding
      - child_org_analytics
      - calendar_booking_code
      - create_resource_calendar
      - disable_resource_calendar
      - update_resource_calendar
      - import_resource_calendars
      - create_availability_window
      - update_availability_window
      - delete_availability_window
      - batch_update_availability_windows
      - create_blocked_time
      - update_blocked_time
      - delete_blocked_time
      - calendar_bundle
      - create_calendar
      - update_calendar
      - create_calendar_bundle
      - update_calendar_bundle
      - disable_calendar_bundle
      - webhook_configuration
      - external_event_change_request
      - booking_policy
      - bookable_slots
      type: string
      description: |-
        * `calendar_event` - Calendar Event
        * `calendar` - Calendar
        * `recurrence_rule` - Recurrence Rule
        * `external_attendee` - External Attendee
        * `external_attendance` - External Attendance
        * `attendance` - Attendance
        * `user` - User
        * `resource_allocation` - Resource Allocation
        * `event_recurring_exception` - Event Recurring Exception
        * `blocked_time` - Blocked Time
        * `blocked_time_recurring_exception` - Blocked Time Recurring Exception
        * `available_time` - Available Time
        * `available_time_recurring_exception` - Available Time Recurring Exception
        * `availability_windows` - Availability Windows
        * `unavailable_windows` - Unavailable Windows
        * `organization` - Organization
        * `calendar_group` - Calendar Group
        * `system_user` - System User
        * `membership` - Membership
        * `invitation` - Invitation
        * `branding` - Branding
        * `child_org_analytics` - Child Organization Analytics
        * `calendar_booking_code` - Calendar Booking Code
        * `create_resource_calendar` - Create Resource Calendar
        * `disable_resource_calendar` - Disable Resource Calendar
        * `update_resource_calendar` - Update Resource Calendar
        * `import_resource_calendars` - Import Resource Calendars
        * `create_availability_window` - Create Availability Window
        * `update_availability_window` - Update Availability Window
        * `delete_availability_window` - Delete Availability Window
        * `batch_update_availability_windows` - Batch Update Availability Windows
        * `create_blocked_time` - Create Blocked Time
        * `update_blocked_time` - Update Blocked Time
        * `delete_blocked_time` - Delete Blocked Time
        * `calendar_bundle` - Calendar Bundle
        * `create_calendar` - Create Calendar
        * `update_calendar` - Update Calendar
        * `create_calendar_bundle` - Create Calendar Bundle
        * `update_calendar_bundle` - Update Calendar Bundle
        * `disable_calendar_bundle` - Disable Calendar Bundle
        * `webhook_configuration` - Webhook Configuration
        * `external_event_change_request` - External Event Change Request
        * `booking_policy` - Booking Policy
        * `bookable_slots` - Bookable Slots
    AvailableTime:
      type: object
      description: Serializer for AvailableTime model with recurring support.
      properties:
        id:
          type: integer
          readOnly: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        timezone:
          type: string
          maxLength: 50
        recurrence_rule:
          allOf:
          - $ref: '#/components/schemas/RecurrenceRule'
          description: Recurrence rule data for creating recurring available times
        rrule_string:
          type: string
          writeOnly: true
          description: RRULE string for creating recurring available times
        is_recurring_instance:
          type: boolean
          description: True if this is an instance of a recurring available time
          readOnly: true
        is_recurring:
          type: boolean
          description: True if this is a recurring available time
          readOnly: true
        parent_available_time:
          type: object
          properties:
            id:
              type: integer
          required:
          - id
          nullable: true
          description: Get parent available time for instances.
          readOnly: true
        recurrence_id:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: For recurring instances, this identifies which occurrence this
            is
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        calendar:
          type: integer
          nullable: true
      required:
      - created
      - end_time
      - id
      - is_recurring
      - is_recurring_instance
      - modified
      - parent_available_time
      - recurrence_id
      - start_time
      - timezone
    AvailableTimeBatch:
      type: object
      description: |-
        Transactional batch of create/update/delete operations on a calendar's available times.

        All operations target a single calendar (resolved from ``calendar`` or the user's
        default) and run in one transaction — any failure rolls the whole batch back.
      properties:
        operations:
          type: array
          items:
            $ref: '#/components/schemas/AvailableTimeOperation'
        calendar:
          type: integer
          nullable: true
          description: Calendar to apply the batch to. Defaults to the user's default
            calendar.
      required:
      - operations
    AvailableTimeBulkModification:
      type: object
      properties:
        modification_start_date:
          type: string
          format: date
        recurrence_rule:
          allOf:
          - $ref: '#/components/schemas/RecurrenceRule'
          description: Recurrence rule data for the modification range
        rrule_string:
          type: string
          writeOnly: true
          nullable: true
          description: RRULE string for the modification range
        modified_start_time_offset:
          type: string
          nullable: true
        modified_end_time_offset:
          type: string
          nullable: true
        is_cancelled:
          type: boolean
          default: false
      required:
      - modification_start_date
    AvailableTimeOperation:
      type: object
      description: A single create/update/delete operation in an available-times batch.
      properties:
        action:
          $ref: '#/components/schemas/ActionEnum'
        id:
          type: integer
          description: Target AvailableTime id (required for update/delete).
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        timezone:
          type: string
        rrule_string:
          type: string
          nullable: true
          description: RRULE string; null clears recurrence. Omit to leave unchanged
            on update.
      required:
      - action
    AvailableTimeRecurringException:
      type: object
      description: Serializer for creating recurring available time exceptions.
      properties:
        exception_date:
          type: string
          format: date
          description: The date of the occurrence to modify or cancel
        modified_start_time:
          type: string
          format: date-time
          nullable: true
          description: New start time for the modified occurrence (if not cancelled)
        modified_end_time:
          type: string
          format: date-time
          nullable: true
