        name: X-Organization-Id
        schema:
          type: string
        description: Selects the active organization for this request. Optional for
          callers that belong to exactly one active organization — the single membership
          is resolved implicitly. **Required** when the caller has two or more active
          memberships; omitting it in that case returns **400**. If the header names
          an organization the caller is not an active member of, the server returns
          **403**.
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - invitations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationInvitation'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationInvitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationInvitation'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInvitation'
          description: ''
        '400':
          description: Invitation already accepted or service error
        '403':
          description: Not an active member
        '404':
          description: Invitation not found or cross-org
