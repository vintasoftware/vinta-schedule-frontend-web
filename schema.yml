  /calendar/:
    get:
      operationId: calendar_list
      description: ViewSet for managing calendars.
      summary: List calendars
      parameters:
      - in: header
        name: X-Organization-Id
        schema:
          type: string
        description: Selects the active organization for this request. Optional for
          callers that belong to exactly one active organization — the single membership
          is resolved implicitly. **Required** when the caller has two or more active
          memberships; omitting it in that case returns **400**. If the header names
          an organization the caller is not an active member of, the server returns
          **403**.
      - in: query
        name: calendar_type
        schema:
          type: string
          enum:
          - bundle
          - personal
          - resource
          - virtual
        description: |-
          Filter by calendar type (e.g. resource)

          * `personal` - Personal Calendar
          * `resource` - Resource Calendar
          * `virtual` - Virtual Calendar
          * `bundle` - Bundle Calendar
      - in: query
        name: include_inactive
        schema:
          type: boolean
        description: When true, include inactive (soft-deleted) calendars (visibility=inactive).
          Defaults to false.
      - in: query
        name: include_unlisted
        schema:
          type: boolean
        description: When true, include unlisted calendars (visibility=unlisted) in
          the response. Unlisted calendars are hidden from booking queries but still
          synced. Defaults to false.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: owner
        schema:
          type: string
        description: Scope the listing to a calendar owner. Pass 'me' to return only
          the authenticated user's own calendars. Pass a numeric user id to return
          that user's calendars — allowed for organization admins only; non-admins
          receive 403. When omitted, admins see all organization calendars while non-admins
          are restricted to their own.
      - in: query
        name: provider
        schema:
          type: string
          enum:
          - apple
          - google
          - ics
          - internal
          - microsoft
        description: |-
          Filter by provider (internal = manual, others = synced)

          * `internal` - Internal Calendar
          * `google` - Google Calendar
          * `microsoft` - Microsoft Outlook Calendar
          * `apple` - Apple Calendar
          * `ics` - ICS
      - in: query
        name: sync_enabled
        schema:
          type: boolean
        description: Filter by whether provider sync is enabled
      tags:
      - calendar
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCalendarList'
          description: ''
    post:
      operationId: calendar_create
