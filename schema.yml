  description: API for vinta-schedule-api project
paths:
  /available-times/:
    get:
      operationId: available_times_list
      description: ViewSet for managing available times with recurring support.
      parameters:
      - in: header
        name: X-Organization-Id
        schema:
          type: string
        description: Selects the active organization for this request. Optional for
          callers that belong to exactly one active organization — the single membership
          is resolved implicitly. **Required** when the caller has two or more active
          memberships; omitting it in that case returns **400**. If the header names
          an organization the caller is not an active member of, the server returns
          **403**.
      - in: query
        name: end_time
        schema:
          type: string
          format: date-time
        description: End time (less than or equal to)
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: start_time
        schema:
          type: string
          format: date-time
        description: Start time (greater than or equal to)
      tags:
      - available-times
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAvailableTimeList'
          description: ''
