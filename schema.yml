  /organization-members/:
    get:
      operationId: organization_members_list
      description: |-
        A viewset for listing, retrieving, and managing organization members.

        Admin-only endpoint — lists both active and inactive members of the caller's
        organization, suitable for a datatable view. Non-admin members get 403.

        Actions:
        - `deactivate`: POST to disable a member (prevent self-deactivation and
          protect the last active admin).
        - `reactivate`: POST to re-enable a member.
        - `update-role`: POST to change a member's role (protect the last active admin).
      parameters:
      - in: header
        name: X-Organization-Id
        schema:
          type: string
        description: Selects the active organization for this request. Optional for
          callers that belong to exactly one active organization — the single membership
          is resolved implicitly. **Required** when the caller has two or more active
          memberships; omitting it in that case returns **400**. If the header names
          an organization the caller is not an active member of, the server returns
          **403**.
      - in: query
        name: email
        schema:
          type: string
        description: Filter by partial email match
      - in: query
        name: first_name
        schema:
          type: string
        description: Filter by partial first name match
      - in: query
        name: last_name
        schema:
          type: string
        description: Filter by partial last name match
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Search by first name, last name, or email (OR)
      tags:
      - organization-members
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrganizationMembershipList'
          description: ''
