          type: string
        order:
          type: integer
          maximum: 32767
          minimum: 0
        required_count:
          type: integer
          maximum: 32767
          minimum: 0
          description:
            How many calendars from the pool must be selected when booking.
            Default 1; use larger values when a slot needs multiple calendars (e.g.
            two nurses).
