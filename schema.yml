        ``private_key`` and ``private_key_id`` are never returned.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        audience:
          type: string
          readOnly: true
        configured:
          type: boolean
          description: A persisted row is, by definition, configured.
          readOnly: true
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
        - audience
        - configured
        - created
        - email
        - id
        - modified
    ServiceAccountWrite:
      type: object
      description: |-
        Write serializer for creating/rotating the org-level service account.

        ``private_key`` and ``private_key_id`` are write-only and are never echoed
        back in any response (reads go through ``ServiceAccountReadSerializer``).
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        audience:
          type: string
          maxLength: 255
        public_key:
          type: string
        private_key_id:
          type: string
          writeOnly: true
          maxLength: 255
        private_key:
          type: string
          writeOnly: true
      required:
        - email
        - private_key
        - private_key_id
        - public_key
    SystemUserToken:
      type: object
      description: |-
        Read-only serializer for listing and retrieving public-API tokens.

        Exposes ``id``, ``integration_name``, ``is_active``, and ``available_resources``
        (list of resource_name strings from the related ``ResourceAccess`` rows).
        Never exposes ``long_lived_token_hash`` or ``token``.

        Optimized for list queries: uses prefetched ``available_resources`` from
        the viewset's ``get_queryset`` to avoid N+1 queries.
      properties:
        id:
          type: integer
          readOnly: true
        integration_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          description: Indicates if the user is active.
        available_resources:
          type: array
          items:
            type: string
          description:
            Return a list of resource_name values from the prefetched ResourceAccess
            rows.
          readOnly: true
      required:
        - available_resources
        - id
        - integration_name
        - is_active
    SystemUserTokenCreate:
      type: object
      description: |-
        Input serializer for creating a new public-API token (SystemUser + ResourceAccess rows).

        Accepts ``integration_name`` and ``available_resources`` (a non-empty list of valid
        ``PublicAPIResources`` values).  On a successful create the view adds a write-once
        ``token`` field to the response data; this serializer never stores or exposes
        ``long_lived_token_hash``.
      properties:
        integration_name:
          type: string
          maxLength: 150
        available_resources:
          type: array
          items:
            $ref: '#/components/schemas/AvailableResourcesEnum'
      required:
        - available_resources
        - integration_name
    SystemUserTokenResponse:
      type: object
      description: |-
        Read serializer for the created SystemUser.

        Includes the write-once ``token`` field (sourced from the view) and
        ``available_resources`` (derived from the related ``ResourceAccess`` rows).
        Never exposes ``long_lived_token_hash``.
      properties:
        id:
          type: integer
          readOnly: true
        integration_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          description: Indicates if the user is active.
        available_resources:
          type: array
          items:
            type: string
          description:
            Return a list of resource_name values from the related ResourceAccess
            rows.
          readOnly: true
        token:
          type: string
          readOnly: true
      required:
        - available_resources
        - id
        - integration_name
        - is_active
        - token
    SystemUserTokenUpdate:
      type: object
      description: |-
        Input serializer for updating a public-API token's resource grants (Phase 15).

        Accepts ``available_resources`` (a non-empty list of valid ``PublicAPIResources`` values)
        only.  ``integration_name`` and ``token`` are never accepted or changed.
        The view reconciles ResourceAccess rows: adds rows for newly-granted resources,
        removes rows for dropped resources.
      properties:
        available_resources:
          type: array
          items:
            $ref: '#/components/schemas/AvailableResourcesEnum'
      required:
        - available_resources
    TriggerSourceEnum:
      enum:
        - import
        - manual
        - webhook
        - admin
      type: string
      description: |-
        * `import` - Import
        * `manual` - Manual
        * `webhook` - Webhook
        * `admin` - Admin
    UnavailableTimeWindow:
      type: object
      properties:
        id:
          type: integer
        reason:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        reason_description:
          type: string
          readOnly: true
      required:
        - end_time
        - id
        - reason
        - reason_description
        - start_time
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        phone_number:
          type: string
          readOnly: true
        profile:
          $ref: '#/components/schemas/Profile'
        is_active:
          type: boolean
          readOnly: true
          description:
            Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        is_staff:
          type: boolean
          readOnly: true
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
          description:
            Designates that this user has all permissions without explicitly
            assigning them.
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        last_login:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
        - created
        - email
        - id
        - is_active
        - is_staff
        - is_superuser
        - last_login
        - modified
        - phone_number
        - profile
    WebhookConfiguration:
