            schema:
              $ref: '#/components/schemas/OrganizationInvitation'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationInvitation'
        required: true
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationInvitation'
          description: ''
        '400':
          description: Invitation already accepted or service error
        '403':
          description: Not an active member
        '404':
          description: Invitation not found or cross-org
